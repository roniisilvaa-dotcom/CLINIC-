<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CLINIC CA.RO</title>

  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0A0A0A" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CA.RO Clinic" />
  <meta name="mobile-web-app-capable" content="yes" />

<!-- Preconnect para fontes (não bloqueia render) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<style>
/* ── Splash nativo — aparece antes do JS ── */
#splash {
position: fixed;
inset: 0;
background: #050505;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
z-index: 9999;
transition: opacity 0.25s ease, visibility 0.25s ease;
}
#splash.hide {
opacity: 0;
visibility: hidden;
pointer-events: none;
}
/* Logo mark — mesmo monograma "CR" da tela de login */
#splash .logo {
width: 56px;
height: 56px;
border-radius: 50%;
border: 1px solid #c99b43;
display: flex;
align-items: center;
justify-content: center;
margin-bottom: 20px;
font-family: Georgia, "Times New Roman", serif;
font-size: 20px;
letter-spacing: -3px;
color: #f0d38d;
box-shadow: inset 0 0 20px rgba(201,155,67,.08);
animation: pulse 1.6s ease-in-out infinite;
}
#splash h1 {
font-family: Georgia, serif;
font-size: 26px;
color: #f0d38d;
letter-spacing: 0.02em;
font-weight: 500;
margin: 0;
}
#splash p {
font-family: monospace;
font-size: 9px;
letter-spacing: 0.3em;
text-transform: uppercase;
color: #c99b43;
margin: 8px 0 0;
}
/* Barra de progresso fina */
#splash .bar-track {
position: absolute;
bottom: 0;
left: 0;
right: 0;
height: 2px;
background: rgba(201,155,67,0.12);
}
#splash .bar-fill {
height: 100%;
background: linear-gradient(90deg, #8d6528, #f0d38d, #c99b43);
animation: load 0.8s cubic-bezier(0.4,0,0.2,1) forwards;
width: 0%;
}
@keyframes load {
0% { width: 0% }
60% { width: 70% }
85% { width: 88% }
100% { width: 100% }
}
@keyframes pulse {
0%, 100% { box-shadow: 0 0 0 0 rgba(201,155,67,0); }
50% { box-shadow: 0 0 16px 4px rgba(201,155,67,0.18); }
}
/* Evita flash branco antes do splash */
body { margin: 0; background: #050505; }
#root { background: #050505; }
</style>
</head>
<body>
<!-- Splash nativo — some automaticamente quando o React monta -->
<div id="splash">
<div class="logo">CR</div>
<h1>CA.RO CLINIC</h1>
<p>Precision Hair Medicine</p>
<div class="bar-track"><div class="bar-fill"></div></div>
</div>

<div id="root"></div>

<script type="module" src="/src/main.tsx"></script>

<!-- Remove splash assim que o React termina de montar -->
<script>
(function () {
var t0 = performance.now();
var MIN_MS = 600; // mínimo de exibição para não piscar
function hideSplash() {
var el = document.getElementById('splash');
if (el) el.classList.add('hide');
}
// Observa quando #root ganha filho (React montado)
var obs = new MutationObserver(function () {
var root = document.getElementById('root');
if (root && root.firstChild) {
obs.disconnect();
var elapsed = performance.now() - t0;
var delay = Math.max(0, MIN_MS - elapsed);
setTimeout(hideSplash, delay);
}
});
obs.observe(document.getElementById('root'), { childList: true });
})();
</script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').then(function (reg) {
          // O navegador já checa por versão nova do service worker a cada
          // navegação, mas o app instalado (PWA) pode ficar aberto dias sem
          // navegar pra lugar nenhum. Esse intervalo garante que a checagem
          // aconteça mesmo assim, pra pegar deploys novos rapidamente.
          setInterval(function () {
            reg.update().catch(function () {});
          }, 60000);
        }).catch(function (err) {
          console.warn('Falha ao registrar service worker:', err);
        });

        // sw.js já chama self.skipWaiting() + self.clients.claim() em cada
        // deploy, então a versão nova assume o controle da página sozinha.
        // Quando isso acontece, recarregamos a página automaticamente pra
        // garantir que o HTML/JS/CSS mais novo seja carregado — sem a Dra.
        // precisar limpar cache ou fazer qualquer coisa manualmente.
        var jaRecarregou = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (jaRecarregou) return;
          jaRecarregou = true;
          window.location.reload();
        });
      });
    }
  </script>
</body>
</html>
